{% extends "base.html" %}

{% block content %}
<section class="card">
    <h2>Авторизация</h2>

    <form method="post">
        <label>Логин</label>
        <input type="text" name="login" required>

        <label>Пароль</label>
        <input type="password" name="password" required>

        <button type="submit">Войти</button>
    </form>

    <p>Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
</section>
{% endblock %}
